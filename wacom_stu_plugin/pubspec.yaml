name: wacom_stu_plugin
description: >-
  Flutter Windows plugin for Wacom STU signature tablets. Connects,
  disconnects, and streams pen input events via method and event channels.
version: 1.0.2
homepage: https://github.com/bamboat3/flutter_wacom_signature_pad
repository: https://github.com/bamboat3/flutter_wacom_signature_pad

topics:
  - wacom
  - signature
  - windows
  - plugin
  - tablet

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.5"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: WacomStuPluginCApi
